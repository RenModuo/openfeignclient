apiVersion: apps/v1
kind: Deployment
metadata:
  name: openfeignclient
  labels:
    app: openfeignclient
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openfeignclient
  template:
    metadata:
      labels:
        app: openfeignclient
    spec:
      containers:
        - name: openfeignclient
          image: yklee2002/openfeignclient:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: BOOK_API_URL
              value: http://resttemplateserver:8080

---
apiVersion: v1
kind: Service
metadata:
  name: openfeignclient
  labels:
    app: openfeignclient
spec:
  type: NodePort
  selector:
    app: openfeignclient
  ports:
    - name: http
      port: 8083
      targetPort: 8083
      nodePort: 30104